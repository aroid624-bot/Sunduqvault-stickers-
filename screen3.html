<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Step 3: Grid Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        :root {
            --primary: #ffd700;
            --dark: #1a1a1a;
            --gold-glow: rgba(255, 215, 0, 0.5);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            min-height: 100vh;
            color: var(--dark);
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        p {
            margin-bottom: 20px;
        }
        #previewArea {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid var(--dark);
            border-radius: 16px;
            padding: 15px;
            margin: 20px auto;
            width: 100%;
            max-width: 500px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--dark);
        }
        .controls {
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 16px;
            margin: 20px auto;
            max-width: 600px;
            border: 2px solid var(--dark);
        }
        .controls button {
            background: var(--dark);
            color: var(--primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .controls button:hover {
            background: #333;
            transform: translateY(-2px);
        }
        input[type="file"] {
            background: rgba(255,255,255,0.3);
            border: 2px solid var(--dark);
            border-radius: 8px;
            padding: 10px;
            margin: 10px;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .quantity-btn {
            background: var(--dark);
            color: var(--primary);
            border: none;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            cursor: pointer;
        }
        #quantity {
            width: 70px;
            text-align: center;
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid var(--dark);
            background: rgba(255,255,255,0.3);
        }
        .next-btn {
            background: var(--dark);
            border: none;
            border-radius: 12px;
            padding: 18px 30px;
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin: 30px auto;
            display: block;
            width: 100%;
            max-width: 400px;
        }
        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--gold-glow);
        }
    </style>
</head>
<body>
    <h1>🎨 STEP 3: FILL YOUR GRIDS</h1>
    <p>Click a grid. Upload an image. Drag to move. Use buttons to rotate or delete.</p>

    <div id="previewArea">
        <canvas id="previewCanvas" width="400" height="600"></canvas>
    </div>

    <div class="controls">
        <h3>🛠️ EDIT SELECTED GRID</h3>
        <input type="file" id="imageUpload" accept="image/*">
        <button onclick="rotateImage()">🔄 Rotate</button>
        <button onclick="deleteImage()">🗑️ Delete</button>
        <p>Click a grid to select it, then upload an image.</p>
    </div>

    <div class="controls">
        <h3>🔢 HOW MANY SHEETS?</h3>
        <div class="quantity-controls">
            <button class="quantity-btn" onclick="changeQuantity(-1)">-</button>
            <input type="number" id="quantity" value="1" min="1" max="10">
            <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
        </div>
        <p>Same design × quantity</p>
    </div>

    <button class="next-btn" onclick="goToSummary()">✅ GO TO ORDER SUMMARY (STEP 4)</button>

    <script>
        // ========== GET DATA FROM PREVIOUS PAGE ==========
        const layout = localStorage.getItem('stickerLayout') || 'full';
        const totalGrids = parseInt(localStorage.getItem('stickerGrids')) || 1;
        const pricePerGrid = parseFloat(localStorage.getItem('pricePerGrid')) || 100;

        // ========== CANVAS SETUP ==========
        const canvas = new fabric.Canvas('previewCanvas');
        const canvasWidth = 400;
        const canvasHeight = 600;
        canvas.setWidth(canvasWidth);
        canvas.setHeight(canvasHeight);

        // ========== GRID CALCULATION ==========
        let cols = 1, rows = 1;
        if (layout === 'half') { cols = 1; rows = 2; }
        else if (layout === 'quarter') { cols = 2; rows = 2; }
        else if (layout === 'eight') { cols = 2; rows = 4; }
        else { cols = 1; rows = 1; }

        const gridWidth = canvasWidth / cols;
        const gridHeight = canvasHeight / rows;

        // Track filled grids
        const filledGrids = new Array(totalGrids).fill(false);

        // ========== DRAW GRIDS AND CLICKABLE AREAS ==========
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const gridIndex = row * cols + col;
                if (gridIndex >= totalGrids) break;

                // White background rectangle
                const rect = new fabric.Rect({
                    left: col * gridWidth + 2,
                    top: row * gridHeight + 2,
                    width: gridWidth - 4,
                    height: gridHeight - 4,
                    fill: 'white',
                    stroke: '#1a1a1a',
                    strokeWidth: 2,
                    selectable: false,
                    name: `grid-${gridIndex}`
                });
                canvas.add(rect);

                // Clickable area for uploading
                const clickArea = new fabric.Rect({
                    left: col * gridWidth + 2,
                    top: row * gridHeight + 2,
                    width: gridWidth - 4,
                    height: gridHeight - 4,
                    fill: 'rgba(0,0,0,0)',
                    stroke: 'transparent',
                    selectable: false,
                    evented: true,
                    hoverCursor: 'pointer',
                    name: `click-${gridIndex}`
                });

                clickArea.on('mousedown', function() {
                    if (filledGrids[gridIndex]) {
                        alert('This grid already has an image! Delete it first.');
                        return;
                    }

                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = function(e) {
                        const file = e.target.files[0];
                        if (!file) return;

                        const reader = new FileReader();
                        reader.onload = function(event) {
                            fabric.Image.fromURL(event.target.result, function(img) {
                                // Scale image to fit grid nicely
                                const maxWidth = gridWidth - 20;
                                const maxHeight = gridHeight - 20;
                                let scale = Math.min(maxWidth / img.width, maxHeight / img.height);
                                if (scale > 1) scale = 1;
                                img.scale(scale);

                                // Center in grid
                                const centerX = col * gridWidth + (gridWidth / 2);
                                const centerY = row * gridHeight + (gridHeight / 2);

                                img.set({
                                    left: centerX,
                                    top: centerY,
                                    originX: 'center',
                                    originY: 'center',
                                    name: `image-${gridIndex}`,
                                    selectable: true,
                                    hasControls: true,
                                    hasBorders: true,
                                    borderColor: '#ffd700',
                                    cornerColor: '#ffd700',
                                    cornerSize: 8
                                });

                                canvas.add(img);
                                filledGrids[gridIndex] = true;
                                
                                // Remove click area and label
                                canvas.remove(clickArea);
                                const label = canvas.getObjects().find(obj => obj.name === `label-${gridIndex}`);
                                if (label) canvas.remove(label);
                                
                                canvas.renderAll();
                            });
                        };
                        reader.readAsDataURL(file);
                    };
                    input.click();
                });

                canvas.add(clickArea);

                // Add text label for empty grid
                const label = new fabric.Text(`📸 Grid ${gridIndex + 1}`, {
                    left: col * gridWidth + (gridWidth / 2),
                    top: row * gridHeight + (gridHeight / 2),
                    originX: 'center',
                    originY: 'center',
                    fontSize: 12,
                    fill: '#1a1a1a',
                    selectable: false,
                    name: `label-${gridIndex}`
                });
                canvas.add(label);
            }
        }

        canvas.renderAll();

        // ========== ROTATE FUNCTION ==========
        function rotateImage() {
            const obj = canvas.getActiveObject();
            if (obj && obj.name && obj.name.startsWith('image-')) {
                obj.rotate((obj.angle || 0) + 15);
                canvas.renderAll();
            } else {
                alert('Select an image first!');
            }
        }

        // ========== DELETE FUNCTION ==========
        function deleteImage() {
            const obj = canvas.getActiveObject();
            if (obj && obj.name && obj.name.startsWith('image-')) {
                const gridIndex = parseInt(obj.name.split('-')[1]);
                filledGrids[gridIndex] = false;
                canvas.remove(obj);
                location.reload();
            } else {
                alert('Select an image first!');
            }
        }

        // ========== QUANTITY CONTROL ==========
        let currentQuantity = 1;
        function changeQuantity(change) {
            const input = document.getElementById('quantity');
            let newVal = parseInt(input.value) + change;
            if (newVal < 1) newVal = 1;
            if (newVal > 10) newVal = 10;
            input.value = newVal;
            currentQuantity = newVal;
            localStorage.setItem('stickerQuantity', currentQuantity);
        }

        // ========== GO TO SUMMARY ==========
        function goToSummary() {
            // Count filled grids
            let filledCount = 0;
            canvas.getObjects().forEach(obj => {
                if (obj.name && obj.name.startsWith('image-')) filledCount++;
            });

            if (filledCount === 0) {
                alert('⚠️ Please add at least one image to a grid before continuing!');
                return;
            }

            // Get quantity
            const quantity = parseInt(document.getElementById('quantity').value) || 1;
            
            // Calculate price
            const subtotal = filledCount * pricePerGrid;
            const totalPrice = subtotal * quantity;

            // Save to localStorage
            localStorage.setItem('filledGrids', filledCount);
            localStorage.setItem('totalPrice', totalPrice);
            localStorage.setItem('stickerQuantity', quantity);
            localStorage.setItem('stickerSubtotal', subtotal);

            alert(`✅ You filled ${filledCount} of ${totalGrids} grids.\nQuantity: ${quantity} sheet(s)\nTotal: Rs.${totalPrice}`);

            window.location.href = 'screen4.html';
        }

        // Initialize quantity from localStorage if exists
        if (localStorage.getItem('stickerQuantity')) {
            const savedQty = parseInt(localStorage.getItem('stickerQuantity'));
            if (!isNaN(savedQty) && savedQty >= 1 && savedQty <= 10) {
                document.getElementById('quantity').value = savedQty;
                currentQuantity = savedQty;
            }
        }
    </script>
</body>
</html>
