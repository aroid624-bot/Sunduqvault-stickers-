<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Step 3: Grid Editor</title>
    <!-- 🔗 LOAD FABRIC.JS LIBRARY FOR IMAGE EDITING -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
            <style>
        :root {
            --primary: #ffd700;
            --secondary: #b8860b;
            --dark: #1a1a1a;
            --light: #ffffff;
            --accent: #ffb347;
            --gray: #666666;
            --gold-glow: rgba(255, 215, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            min-height: 100vh;
            color: var(--dark);
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--dark);
            font-weight: 800;
        }

        p {
            color: var(--dark);
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        #previewArea {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid var(--dark);
            border-radius: 16px;
            padding: 15px;
            margin: 20px auto;
            width: 100%;
            max-width: 450px;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            box-shadow: 0 10px 30px var(--gold-glow);
        }

        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--dark);
        }

        .controls {
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 16px;
            margin: 20px auto;
            max-width: 600px;
            text-align: center;
            border: 2px solid var(--dark);
        }

        .controls h3 {
            color: var(--dark);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .controls button {
            background: var(--dark);
            color: var(--primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin: 8px;
            cursor: pointer;
            font-weight: 600;
            display: inline-block;
            width: auto;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: #333333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--gold-glow);
        }

        input[type="file"] {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid var(--dark);
            border-radius: 8px;
            color: var(--dark);
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button[onclick="goToSummary()"] {
            background: var(--dark);
            border: none;
            border-radius: 12px;
            padding: 18px 30px;
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin: 30px auto;
            display: block;
            text-align: center;
            max-width: 400px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px var(--gold-glow);
        }

        button[onclick="goToSummary()"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px var(--gold-glow);
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .quantity-btn {
            background: var(--dark);
            color: var(--primary);
            border: none;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quantity-btn:hover {
            background: #333333;
            transform: scale(1.1);
        }

        #quantity {
            width: 70px;
            text-align: center;
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid var(--dark);
            background: rgba(255,255,255,0.3);
            color: var(--dark);
        }
                </style>


</head>
<body>
    <h1>🎨 STEP 3: FILL YOUR GRIDS</h1>
    <p>Upload an image for each grid. Drag, resize, and rotate!</p>

    <!-- 📐 THE A4 PREVIEW CANVAS -->
    <div id="previewArea">
        <!-- Grids will be drawn here by JavaScript -->
     <canvas id="previewCanvas" width="300" height="460"></canvas>
    </div>

    <!-- 🎯 CONTROLS FOR THE SELECTED GRID -->
    <div class="controls">
        <h3>🛠️ EDIT SELECTED GRID</h3>
        <input type="file" id="imageUpload" accept="image/*">
        <button onclick="rotateImage()">🔄 Rotate</button>
        <button onclick="deleteImage()">🗑️ Delete Image</button>
        <p>Click on a grid to select it, then upload or edit.</p>
    </div>

    

<!-- 🔢 QUANTITY CONTROLS -->
<div class="controls" style="margin-top: 30px;">
    <h3>🔢 HOW MANY SHEETS?</h3>
    <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0;">
        <button onclick="changeQuantity(-1)" style="background: var(--primary); color: white; border: none; border-radius: 8px; width: 40px; height: 40px; font-size: 1.5rem; cursor: pointer;">-</button>
        <input type="number" id="quantity" value="1" min="1" max="10" style="width: 70px; text-align: center; font-size: 1.2rem; padding: 8px; border-radius: 8px; border: 2px solid var(--primary); background: rgba(255,255,255,0.1); color: white;">
        <button onclick="changeQuantity(1)" style="background: var(--primary); color: white; border: none; border-radius: 8px; width: 40px; height: 40px; font-size: 1.5rem; cursor: pointer;">+</button>
    </div>
    
    <p style="color: #94a3b8; font-size: 0.9rem;">Each sheet = same design × quantity</p>
</div>

<!-- 🚀 NAVIGATION -->
<div style="text-align: center; margin-top: 30px;">
    <button style="padding: 15px 30px; font-size: 1.2rem; background: #0d9488; color: white;" onclick="goToSummary()">
        ✅ GO TO ORDER SUMMARY (STEP 4)
    </button>
</div>

    <script>
        // 🧠 GET DATA FROM PREVIOUS SCREEN
        const orientation = localStorage.getItem('stickerOrientation');
        const layout = localStorage.getItem('stickerLayout');
        const totalGrids = parseInt(localStorage.getItem('stickerGrids'));
        const pricePerGrid = parseFloat(localStorage.getItem('pricePerGrid'));

        // 🎨 SETUP FABRIC CANVAS
        const canvas = new fabric.Canvas('previewCanvas');
        const canvasWidth = 300;
        const canvasHeight = 460 ;
        let activeGridIndex = null;

        // 📏 CALCULATE GRID POSITIONS (SIMPLIFIED MATH)
        let gridWidth, gridHeight, cols, rows;
        if (layout === 'full') { cols = 1; rows = 1; }
        if (layout === 'half') { cols = 1; rows = 2; } // Portrait: 2 vertical grids
        if (layout === 'quarter') { cols = 2; rows = 2; }
        if (layout === 'eight') { cols = 2; rows = 4; }

        gridWidth = canvasWidth / cols;
        gridHeight = canvasHeight / rows;

       // 🟦 DRAW THE EMPTY GRIDS WITH UPLOAD BUTTONS
for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
        const gridIndex = row * cols + col;
        if (gridIndex >= totalGrids) break;

        // Create the grid rectangle
        const rect = new fabric.Rect({
            left: col * gridWidth,
            top: row * gridHeight,
            width: gridWidth - 2,
            height: gridHeight - 2,
            fill: 'white',
            stroke: '#0d9488',
            strokeWidth: 2,
            selectable: false,
            name: `grid-${gridIndex}`
        });
        canvas.add(rect);
        canvas.setBackgroundColor('lightgray', canvas.renderAll.bind(canvas));

        

        // 🆕 CREATE AN INVISIBLE UPLOAD BUTTON OVER THE GRID
        // We'll make a transparent rectangle that acts as a button
        const buttonZone = new fabric.Rect({
            left: col * gridWidth,
            top: row * gridHeight,
            width: gridWidth - 2,
            height: gridHeight - 2,
            fill: 'rgba(13, 148, 136, 0.05)', // Almost transparent
            stroke: 'transparent',
            selectable: false,
            name: `upload-btn-${gridIndex}`,
            hoverCursor: 'pointer'
        });
        
        // 🆕 WHEN THIS INVISIBLE BUTTON IS CLICKED
        buttonZone.on('mousedown', function() {
            // Create a hidden file input
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.style.display = 'none';
            
            // When a file is chosen
            fileInput.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    fabric.Image.fromURL(event.target.result, function(img) {
                        // Scale image to fit grid
                        const scale = Math.min(
                            (gridWidth - 20) / img.width,
                            (gridHeight - 20) / img.height
                        );
                        img.scale(scale);
                        
                        // Center in the grid
                        img.set({
                            left: col * gridWidth + (gridWidth / 2),
                            top: row * gridHeight + (gridHeight / 2),
                            originX: 'center',
                            originY: 'center',
                            name: `image-for-grid-${gridIndex}`,
                            selectable: true // ✅ User can now click and rotate this image!
                        });
                        
                        canvas.add(img);
                        canvas.renderAll();
                    });
                };
                reader.readAsDataURL(file);
            };
            
            // Trigger the file selection dialog
            document.body.appendChild(fileInput);
            fileInput.click();
            document.body.removeChild(fileInput);
        });
        
        canvas.add(buttonZone);
        
        // 🆕 ADD A TEXT LABEL INSIDE EMPTY GRID
        const labelText = new fabric.Text(`Grid ${gridIndex + 1}\n(Click to upload)`, {
            left: col * gridWidth + (gridWidth / 2),
            top: row * gridHeight + (gridHeight / 2),
            originX: 'center',
            originY: 'center',
            fontSize: 12,
            fill: '#64748b',
            textAlign: 'center',
            selectable: false,
            name: `label-for-grid-${gridIndex}`
        });
        canvas.add(labelText);
    }
}

                // Make grid clickable to select
                rect.on('mousedown', () => {
                    activeGridIndex = gridIndex;
                    alert(`Grid ${gridIndex + 1} selected! Now upload an image for it.`);
                });
        

        // 📤 HANDLE IMAGE UPLOAD FOR THE SELECTED GRID
        document.getElementById('imageUpload').onchange = function(e) {
            if (activeGridIndex === null) {
                alert("⚠️ Click on a grid first to select it!");
                return;
            }
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    // Scale image to fit the grid
                    img.scaleToWidth(gridWidth - 10);
                    img.scaleToHeight(gridHeight - 10);

                    // Center it in the selected grid
                    const col = activeGridIndex % cols;
                    const row = Math.floor(activeGridIndex / cols);
                    img.set({
                        left: col * gridWidth + (gridWidth / 2),
                        top: row * gridHeight + (gridHeight / 2),
                        originX: 'center',
                        originY: 'center',
                        name: `image-for-grid-${activeGridIndex}`
                    });

                    canvas.add(img);
                    canvas.renderAll();
                });
            };
            reader.readAsDataURL(file);
        };

        // 🔄 ROTATE THE IMAGE IN THE SELECTED GRID
        function rotateImage() {
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject.name && activeObject.name.startsWith('image-for-grid-')) {
                activeObject.rotate((activeObject.angle || 0) + 15);
                canvas.renderAll();
            } else {
                alert("Select an image by clicking on it first!");
            }
        }

        // 🗑️ DELETE THE IMAGE FROM THE SELECTED GRID
        function deleteImage() {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                canvas.remove(activeObject);
                canvas.renderAll();
            }}

    function goToSummary() {
    // Count images
    let filledCount = 0;
    canvas.getObjects().forEach(obj => {
        if (obj.name && obj.name.startsWith('image-for-grid-')) {
            filledCount++;
        }
    });
    
    // Calculate price
    const totalPrice = filledCount * pricePerGrid;
    
    // Save data
    localStorage.setItem('filledGrids', filledCount);
    localStorage.setItem('totalPrice', totalPrice);
    
    // Simple alert
    alert(`✅ You filled ${filledCount} of ${totalGrids} grids. Total: Rs.${totalPrice}`);
    
    // REDIRECT — THIS MUST WORK
    window.location.href = 'screen4.html';
        }
    </script>                
</body>
      </html>
