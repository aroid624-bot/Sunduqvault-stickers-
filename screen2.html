<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔄 Choose Your Path | SunduqVault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

 <style>
        :root {
            --primary: #ffd700;
            --secondary: #b8860b;
            --dark: #0f172a;
            --light: #f8fafc;
            --accent: #ffb347;
            --gold-glow: rgba(255, 215, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--light);
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 50px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #cbd5e1;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            margin-bottom: 50px;
            box-shadow: 0 20px 60px var(--gold-glow);
        }

        .question-icon {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .question-hint {
            color: #94a3b8;
            font-size: 1rem;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            max-width: 600px;
            margin: 0 auto;
        }

        .choice-btn {
            background: linear-gradient(135deg, var(--primary), #e6c200);
            border: none;
            border-radius: 20px;
            padding: 30px 25px;
            color: #0f172a;
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px var(--gold-glow);
            text-align: left;
        }

        .choice-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px var(--gold-glow);
        }

        .choice-btn.option2 {
            background: linear-gradient(135deg, var(--secondary), #9e7600);
        }

        .btn-icon {
            font-size: 2.5rem;
        }

        .btn-text {
            flex: 1;
        }

        .btn-desc {
            display: block;
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 8px;
            color: #0f172a;
        }

        @media (min-width: 768px) {
            .choices-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .choice-btn {
                flex-direction: column;
                text-align: center;
                padding: 40px 25px;
            }
            .btn-icon {
                margin-bottom: 15px;
            }
        }

        .footer-note {
            margin-top: 50px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .highlight {
            color: var(--primary);
            font-weight: 700;
        }
 </style>
            

</head>
<body>
    <div class="container">
        <!-- 🏔️ HEADER -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-mosque"></i>
            </div>
            <h1>SunduqVault Stickers</h1>
            <p class="subtitle">Halal earnings. Heartfelt giving. Every design carries a dua.</p>
        </div>

        <!-- ❓ QUESTION CARD -->
        <div class="question-card">
            <div class="question-icon">
                <i class="fas fa-question-circle"></i>
            </div>
            <p class="question-text">How would you like to create your sticker?</p>
            <p class="question-hint">Choose your path below. Both lead to unique, personalized stickers.</p>
        </div>

        <!-- 🔘 CHOICE BUTTONS -->
        <div class="choices-grid">
            <!-- OPTION 1: CUSTOM DESIGN -->
            <button class="choice-btn" onclick="goToCustom()">
                <div class="btn-icon">
                    <i class="fas fa-paint-brush"></i>
                </div>
                <div class="btn-text">
                    Design My Own
                    <span class="btn-desc">Upload your image, create something unique.</span>
                </div>
                <i class="fas fa-arrow-right"></i>
            </button>

            <!-- OPTION 2: TRENDING DESIGNS -->
            <button class="choice-btn option2" onclick="goToTrending()">
                <div class="btn-icon">
                    <i class="fas fa-fire"></i>
                </div>
                <div class="btn-text">
                    Browse Trending
                    <span class="btn-desc">Choose from our popular, ready-to-print designs.</span>
                </div>
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <!-- 🔽 FOOTER -->
        <p class="footer-note">
            Powered by <span class="highlight">Barakah</span> • Every sale fills a plate.
        </p>
    </div>

    <script>
        function goToCustom() {
            // 🎨 Redirect to your original custom design flow
            // Change 'screen2_design.html' to your actual custom flow start page
            window.location.href = 'screen2_design.html';
        }

        function goToTrending() {
            // 🔥 Redirect to trending stickers gallery
            // Change 'trending.html' to your actual trending page
            window.location.href = 'trending.html';
        }
    </script>
</body>
</html>
